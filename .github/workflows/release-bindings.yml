# Build + publish language clients on tag v* (or workflow_dispatch).
# Secrets: MAVEN_*, GPG_*, PYPI_API_TOKEN, CARGO_REGISTRY_TOKEN
# See docs/PUBLISHING.md

name: Release bindings

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-bindings-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/sync_native.py
      - uses: actions/upload-artifact@v4
        with:
          name: native-sources
          path: bindings/native

  native:
    needs: sync-native
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_os: linux
            artifact_arch: x86_64
          - os: windows-2022
            artifact_os: windows
            artifact_arch: x86_64
          - os: macos-latest
            artifact_os: macos
            artifact_arch: aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: native-sources
          path: bindings/native
      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: choco install ninja -y
      - name: Configure + build shared libemq
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cmake -S bindings/native -B build-native -G Ninja \
              -DCMAKE_BUILD_TYPE=Release -DEMQ_BUILD_SHARED=ON
          else
            cmake -S bindings/native -B build-native \
              -DCMAKE_BUILD_TYPE=Release -DEMQ_BUILD_SHARED=ON
          fi
          cmake --build build-native --config Release --parallel
          DEST="out/native/${{ matrix.artifact_os }}/${{ matrix.artifact_arch }}"
          mkdir -p "$DEST"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            DLL=$(find build-native -name 'emq.dll' | head -1)
            test -n "$DLL"
            cp -f "$DLL" "$DEST/emq.dll"
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            LIB=$(find build-native -name 'libemq*.dylib' | head -1)
            test -n "$LIB"
            cp -f "$LIB" "$DEST/libemq.dylib"
          else
            LIB=$(find build-native -name 'libemq.so*' -type f | head -1)
            test -n "$LIB"
            cp -f "$LIB" "$DEST/libemq.so"
          fi
          ls -la "$DEST"
      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.artifact_os }}-${{ matrix.artifact_arch }}
          path: out/native

  package-java:
    needs: native
    # Proceed even if one platform native failed (fat JAR gets whatever built).
    if: always() && needs.native.result != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "22"
      - uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: _natives
          merge-multiple: true
      - name: Stage resources + package JAR
        run: |
          set -euo pipefail
          # Artifacts upload out/native/<os>/<arch>/..., so merge lands as _natives/<os>/...
          test -d _natives
          mkdir -p bindings/java/src/main/resources/native
          rm -rf bindings/java/src/main/resources/native
          mkdir -p bindings/java/src/main/resources/native
          cp -a _natives/. bindings/java/src/main/resources/native/
          find bindings/java/src/main/resources/native -type f -print
          test -n "$(find bindings/java/src/main/resources/native -type f | head -1)"
          cd bindings/java
          mvn -B -q package -DskipTests
          mkdir -p ../../dist
          cp target/embeddedmq-*.jar ../../dist/
          tar -czf ../../dist/java-project.tgz \
            -C ../.. \
            bindings/java/pom.xml \
            bindings/java/src
      - uses: actions/upload-artifact@v4
        with:
          name: java-jar
          path: |
            dist/*.jar
            dist/java-project.tgz

  package-python:
    needs: sync-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          name: native-sources
          path: bindings/native
      - name: Build sdist
        run: |
          python -m pip install -U pip build
          rm -rf bindings/python/native
          cp -a bindings/native bindings/python/native
          cd bindings/python
          python -m build --sdist
          mkdir -p ../../dist
          cp dist/*.tar.gz ../../dist/
      - uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: dist/*.tar.gz

  smoke-bundled:
    needs: sync-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: actions/download-artifact@v4
        with:
          name: native-sources
          path: bindings/native
      - name: Python + Go smoke
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq build-essential
          python -m venv .venv
          . .venv/bin/activate
          pip install -U pip
          rm -rf bindings/python/native
          cp -a bindings/native bindings/python/native
          pip install ./bindings/python
          python -c 'import embeddedmq; print("python ok")'
          # Library package: compile only (no main / no -o).
          (cd bindings/go && CGO_ENABLED=1 go build -v .)
          echo go ok

  publish-github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [package-java, package-python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: _artifacts
      - name: Assemble release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find _artifacts -type f \( -name '*.jar' -o -name '*.tar.gz' -o -name '*.whl' \) \
            ! -name '*-sources.jar' ! -name '*-javadoc.jar' ! -name 'java-project.tgz' \
            -exec cp {} release-assets/ \; || true
          for d in _artifacts/native-*; do
            [[ -d "$d" ]] || continue
            base=$(basename "$d")
            (cd "$d" && zip -r "../../release-assets/${base}.zip" .) || true
          done
          ls -la release-assets
          test "$(ls -A release-assets)"
      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') || contains(github.ref_name, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-maven:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [package-java]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: java-jar
          path: _java
      - name: Restore staged Java project with natives
        run: |
          set -euo pipefail
          tar -xzf _java/java-project.tgz
          find bindings/java/src/main/resources/native -type f -print
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "22"
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - name: Deploy to Maven Central
        working-directory: bindings/java
        run: mvn -B -Pcentral deploy -DskipTests
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [package-python, smoke-bundled]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-sdist
          path: dist
      - name: Publish to PyPI
        if: ${{ env.PYPI_API_TOKEN != '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist/
          skip-existing: true
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
      - name: Skip PyPI
        if: ${{ env.PYPI_API_TOKEN == '' }}
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: echo "PYPI_API_TOKEN not set — skip"

  publish-crates:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [sync-native, smoke-bundled]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: native-sources
          path: bindings/native
      - run: |
          rm -rf bindings/rust/emq-sys/native
          cp -a bindings/native bindings/rust/emq-sys/native
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish crates
        if: ${{ env.CARGO_REGISTRY_TOKEN != '' }}
        working-directory: bindings/rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p emq-sys --allow-dirty
          sleep 30
          cargo publish -p emq --allow-dirty
      - name: Skip crates.io
        if: ${{ env.CARGO_REGISTRY_TOKEN == '' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: echo "CARGO_REGISTRY_TOKEN not set — skip"
