name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows / msvc
            os: windows-2022
            compiler: msvc
          - name: ubuntu / gcc
            os: ubuntu-latest
            compiler: gcc
            cc: gcc
          - name: ubuntu / clang
            os: ubuntu-latest
            compiler: clang
            cc: clang
          - name: macos / appleclang
            os: macos-latest
            compiler: appleclang
            cc: clang

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC + Ninja
        if: matrix.compiler == 'msvc'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja (Windows)
        if: matrix.compiler == 'msvc'
        shell: bash
        run: choco install ninja -y

      - name: Configure (Windows MSVC)
        if: matrix.compiler == 'msvc'
        shell: cmd
        run: cmake -S core -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DEMQ_BUILD_STRESS=ON -DEMQ_FAULT_INJECT=ON -DEMQ_BUILD_BENCH=ON

      - name: Configure (Unix)
        if: matrix.compiler != 'msvc'
        env:
          CC: ${{ matrix.cc }}
        run: cmake -S core -B build -DCMAKE_BUILD_TYPE=Release -DEMQ_BUILD_STRESS=ON -DEMQ_FAULT_INJECT=ON -DEMQ_BUILD_BENCH=ON

      # Core engine builds use `cmake -S core` so this job stays valid when
      # optional monorepo targets (transport, bindings) are absent.

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: CTest
        run: ctest --test-dir build -C Release --output-on-failure --timeout 180

      - name: Bench (report only)
        shell: bash
        run: |
          set +e
          for c in \
            ./build/bench/emq_bench_load.exe \
            ./build/bench/Release/emq_bench_load.exe \
            ./build/bench/emq_bench_load
          do
            if [ -x "$c" ]; then "$c" --quick; exit 0; fi
          done
          exit 0

  sanitize-asan:
    name: Ubuntu Clang ASan+UBSan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: >
          cmake -S core -B build -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER=clang
          -DEMQ_SANITIZE=address,undefined
          -DEMQ_BUILD_STRESS=ON -DEMQ_FAULT_INJECT=ON
          -DEMQ_BUILD_BENCH=OFF -DEMQ_BUILD_EXAMPLES=OFF
      - name: Build
        run: cmake --build build --parallel
      - name: CTest
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1
        run: ctest --test-dir build --output-on-failure --timeout 300

  sanitize-tsan:
    name: Ubuntu Clang TSan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: >
          cmake -S core -B build -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER=clang
          -DEMQ_SANITIZE=thread
          -DEMQ_BUILD_STRESS=ON -DEMQ_FAULT_INJECT=ON
          -DEMQ_BUILD_BENCH=OFF -DEMQ_BUILD_EXAMPLES=OFF
      - name: Build
        run: cmake --build build --parallel
      - name: CTest (threaded suites)
        env:
          # Suppress known lock-free ring races; still fail on other TSan hits.
          TSAN_OPTIONS: halt_on_error=1:suppressions=${{ github.workspace }}/core/cmake/tsan_suppressions.txt
        run: ctest --test-dir build --output-on-failure --timeout 300 -L "stress|fuzz|difftest|model"

  # Optional ARM64 coverage — enable when runners are available.
  arm64-stub:
    name: Linux ARM64 (manual / optional)
    if: false
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Configure core-only
        run: cmake -S core -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --parallel
      - name: CTest
        run: ctest --test-dir build --output-on-failure
